<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全港泳池實時助手 Pro</title>
    <style>
        :root {
            --primary: #1a73e8; --success: #34a853; --danger: #ea4335; --warning: #fbbc05; --bg: #f8f9fa;
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg); padding: 0; margin: 0; }
        header { text-align: center; padding: 20px; background: white; border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 100; }
        h1 { margin: 0; color: var(--primary); font-size: 1.3rem; }
        
        /* 分區切換按鈕 */
        .filter-bar { display: flex; justify-content: center; gap: 10px; padding: 10px; background: #fff; margin-bottom: 15px; }
        .filter-btn { border: none; background: #eee; padding: 6px 15px; border-radius: 20px; cursor: pointer; font-size: 0.9rem; }
        .filter-btn.active { background: var(--primary); color: white; }

        .container { max-width: 600px; margin: 0 auto; padding: 0 15px; }
        
        .pool-card {
            background: white; border-radius: 12px; padding: 16px; margin-bottom: 12px;
            display: flex; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        
        /* 狀態顏色 */
        .status-indicator { width: 12px; height: 12px; border-radius: 50%; margin-right: 15px; flex-shrink: 0; }
        .open { background-color: var(--success); }
        .cleaning { background-color: var(--danger); }
        .winter-closed { background-color: #999; } /* 冬季關閉用灰色 */
        
        .info { flex-grow: 1; }
        .pool-name { font-weight: 700; color: #333; }
        .district-tag { background: #f0f0f0; color: #666; padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; margin-left: 5px; }
        .status-text { font-size: 0.85rem; margin-top: 4px; }
        .next-clean { font-size: 0.75rem; color: #888; margin-top: 4px; }
        
        .feature-icons { text-align: right; font-size: 0.75rem; color: #999; min-width: 60px; }
    </style>
</head>
<body>

<header>
    <h1>🏊 全港泳池實時助手</h1>
    <div id="live-clock" style="font-size: 0.8rem; color: #888; margin-top: 5px;"></div>
</header>

<div class="filter-bar">
    <button class="filter-btn active" onclick="filterPools('ALL')">全部</button>
    <button class="filter-btn" onclick="filterPools('HK')">港島</button>
    <button class="filter-btn" onclick="filterPools('KLN')">九龍</button>
    <button class="filter-btn" onclick="filterPools('NT')">新界</button>
</div>

<div class="container" id="pool-list"></div>

<script>
    const pools = [
        { name: "九龍公園游泳池", cleaning_day: 2, warm: true, region: "KLN", district: "油尖旺" },
        { name: "維多利亞公園游泳池", cleaning_day: 1, warm: true, region: "HK", district: "東區" },
        { name: "中山紀念公園游泳池", cleaning_day: 5, warm: true, region: "HK", district: "中西區" },
        { name: "堅尼地城游泳池", cleaning_day: 3, warm: true, region: "HK", district: "中西區" },
        { name: "觀塘游泳池", cleaning_day: 3, warm: true, region: "KLN", district: "觀塘" },
        { name: "柴灣游泳池", cleaning_day: 2, warm: false, region: "HK", district: "東區" },
        { name: "沙田賽馬會游泳池", cleaning_day: 1, warm: true, region: "NT", district: "沙田" },
        { name: "荔枝角游泳池", cleaning_day: 3, warm: true, region: "KLN", district: "深水埗" },
        { name: "大埔游泳池", cleaning_day: 5, warm: false, region: "NT", district: "大埔" }
    ];

    let currentFilter = 'ALL';

    function filterPools(region) {
        currentFilter = region;
        // 更新按鈕樣式
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.classList.toggle('active', btn.innerText === (region === 'ALL' ? '全部' : (region==='HK'?'港島':region==='KLN'?'九龍':'新界')));
        });
        renderPools();
    }

    function renderPools() {
        const now = new Date();
        const month = now.getMonth() + 1; // 0-11 改為 1-12
        const today = now.getDay();
        const hour = now.getHours();
        
        // 判斷是否為冬季 (11月至隔年3月)
        const isWinter = (month >= 11 || month <= 3);

        document.getElementById('live-clock').innerText = `更新時間：${now.toLocaleString()}`;
        const listContainer = document.getElementById('pool-list');
        listContainer.innerHTML = '';

        pools.filter(p => currentFilter === 'ALL' || p.region === currentFilter).forEach(pool => {
            
            let status = "open";
            let statusText = "🟢 正常開放中";
            let nextCleanMsg = `下個星期${['日','一','二','三','四','五','六'][pool.cleaning_day]}`;

            // 1. 判斷冬季關閉 (非暖水池 & 冬季)
            if (isWinter && !pool.warm) {
                status = "winter-closed";
                statusText = "❄️ 冬季關閉 (非暖水池)";
                nextCleanMsg = "預計 4 月重開";
            } 
            // 2. 判斷大清潔 (10:00 - 18:00)
            else if (today === pool.cleaning_day && hour >= 10 && hour < 18) {
                status = "cleaning";
                statusText = "🔴 正在大清潔 (暫停開放)";
                nextCleanMsg = "預計今日 18:00 重開";
            }

            const card = `
                <div class="pool-card">
                    <div class="status-indicator ${status}"></div>
                    <div class="info">
                        <div class="pool-name">${pool.name}<span class="district-tag">${pool.district}</span></div>
                        <div class="status-text">${statusText}</div>
                        <div class="next-clean">📅 ${nextCleanMsg}</div>
                    </div>
                    <div class="feature-icons">
                        ${pool.warm ? '♨️ 暖水' : '常溫'}<br>
                        <span style="font-size:10px">06:30-22:00</span>
                    </div>
                </div>
            `;
            listContainer.innerHTML += card;
        });
    }

    renderPools();
    setInterval(renderPools, 60000);
</script>
</body>
</html>
